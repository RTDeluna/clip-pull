<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLIP.PULL Course Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e2e2e2;
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    h2 {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin: 0 0 16px;
      letter-spacing: -0.2px;
    }

    #status {
      font-size: 13px;
      margin-bottom: 14px;
      color: #666;
      min-height: 20px;
      line-height: 1.4;
    }

    button {
      background: #e2e2e2;
      border: none;
      border-radius: 12px;
      padding: 11px 20px;
      box-shadow: 5px 5px 10px #c4c4c4, -5px -5px 10px #ffffff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: inherit;
      font-size: 13px;
      color: #444;
    }

    button:hover {
      box-shadow: inset 3px 3px 6px #c4c4c4, inset -3px -3px 6px #ffffff;
    }

    button:active { transform: scale(0.97); }

    /* ── Spinner (shown briefly during the single POST to Clip.Pull) ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    #spinner {
      display: none;
      margin: 10px auto 0;
      width: 22px;
      height: 22px;
      border: 3px solid #d0d0d0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
  </style>
</head>
<body>
  <h2>CLIP.PULL Course Downloader</h2>

  <div id="status">Detecting video...</div>

  <div id="preview" style="display:none; margin-bottom:12px;">
    <img id="thumbnail" src="" alt="Video thumbnail"
         style="width:100%; border-radius:10px; box-shadow: 3px 3px 8px #bbb, -3px -3px 8px #fff; display:block;">
  </div>

  <!-- Fallback button (hidden — enhanced button created dynamically) -->
  <button id="downloadBtn" style="display:none;">📤 Send to Clip.Pull</button>

  <div id="spinner"></div>

  <script src="popup.js"></script>
</body>
</html>
